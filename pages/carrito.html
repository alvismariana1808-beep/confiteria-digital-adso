<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Confitería Digital ADSO </title>
    <link rel="stylesheet" href="../styles/carrito.css">

</head>
<!-- ENCABEZADO -->

<body>
    <header>

        <div class="logo">
            <img src="../assets/images/dulceria/Logo1.png" alt="Logo de la confitería digital">
        </div>
        <nav>
            <ul class="nav-links">
                <li class="nav-item active">
                    <a href="#">
                        <img src="../assets/images/dulceria/persona.svg" alt="Mi cuenta">
                        Mi cuenta
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#">
                        <img src="../assets/images/dulceria/registro.svg" alt="Registro">
                        Registro
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#">
                        <img src="../assets/images/dulceria/carro.svg" alt="Comprar">
                        Comprar
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <section class="fondo-carrito">
        <div class="carrito">
            <p>
                Carrito de compras
            </p>
        </div>
    </section>
    <section class="carrito-container">

        <!-- PRODUCTOS -->
        <div class="productos">

            <div class="titulo">
                <h1>Productos</h1>
            </div>

            <div class="producto">
                <div class="numero">1</div>

                <img src="../assets/images/dulceria/Nucitas..png" alt="Nucita">

                <div class="info">
                    <h3>Chocolate en crema nucitas colombina</h3>

                    <div class="cantidad">
                        <button>-</button>
                        <span>1</span>
                        <button>+</button>
                    </div>
                </div>

                <div class="precio">
                    $5000
                </div>

                <div class="eliminar">
                     <img src="../assets/images/dulceria/trash-2.svg" alt="basura">
                </div>
            </div>

            <div class="producto">
                <div class="numero">2</div>
                <img src="../assets/images/dulceria/Trululu.jpg" alt="gomitas">

                <div class="info">
                    <h3>Gomitas trululu con manos oka loka</h3>

                    <div class="cantidad">
                        <button>-</button>
                        <span>1</span>
                        <button>+</button>
                    </div>

                </div>

                <div class="precio">
                    $3000
                </div>

                <div class="eliminar">
                     <img src="../assets/images/dulceria/trash-2.svg" alt="basura">
                </div>
            </div>
            <div class="producto">
                <div class="numero">2</div>
                <img src="../assets/images/dulceria/Gomitas.jpg" alt="gomitas">

                <div class="info">
                    <h3>Gomitas trululu sandias ácidas</h3>

                    <div class="cantidad">
                        <button>-</button>
                        <span>1</span>
                        <button>+</button>
                    </div>

                </div>

                <div class="precio">
                    $3000
                </div>

                <div class="eliminar">
                    <img src="../assets/images/dulceria/trash-2.svg" alt="basura">
                </div>
            </div>

        </div>

        <!-- RESUMEN -->
        <div class="resumen-general">

            <div class="resumen">

                <h2>Resumen de compras</h2>

                <div class="fila">
                    <span>Producto:</span>
                    <span>(3)</span>
                </div>

                <div class="fila">
                    <span>Envío:</span>
                    <span>Gratis</span>
                </div>

                <div class="fila">
                    <span>Total a pagar:</span>
                    <span>$8000</span>
                </div>

                <button class="btn-finalizar">
                    Finalizar compra
                </button>

            </div>

            <div class="seguir">
                <div class="icono">🛒</div>

                <button>
                    Seguir comprando
                </button>
            </div>

        </div>

    </section>
</body>

</html>
