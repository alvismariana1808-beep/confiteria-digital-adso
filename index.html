<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Confitería Digital ADSO </title>
    <link rel="stylesheet" href="./styles/index.css">

</head>

<body>
    <header>

        <div class="logo">
            <img src="./assets/images/dulceria/logo.png" alt="Logo de la confitería digital">
        </div>
        <nav>
            <ul class="nav-links">
                <li class="nav-item active">
                    <a href="#">
                        <img src="./assets/images/dulceria/persona.svg" alt="Mi cuenta">
                        Mi cuenta
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#">
                        <img src="./assets/images/dulceria/registro.svg" alt="Registro">
                        Registro
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#">
                        <img src="./assets/images/dulceria/carro.svg" alt="Comprar">
                        Comprar
                    </a>
                </li>
            </ul>

    </header>
    <section class="categorias">
        <a href="#" class="btn-categoria dulceria">Dulcería</a>
        <a href="#" class="btn-categoria regalos">Regalos</a>
    </section>
    <section class="banner-fondo">
        <img src="./assets/images/dulceria/Banner1.png" alt="Banner de la confitería digital">
        <div class="opciones">
            <a href="#" class="btn-opciones">Preferencial</a>

            <a href="#" class="btn-opciones">Mis pedidos</a>
            <hr>
            <a href="#" class="btn-opciones">Quiénes somos</a>
            <hr>
            <a href="#" class="btn-opciones">Categorías</a>
            <hr>
        </div>
    </section>
    <section class="productos">
        </div>
            <div class="card">
                <img src="./assets/images/dulceria/Amoras.jpg" alt="Amoras">
                <a href="#" class="btn-productos">Ver productos</a>
            </div>

            <div class="card">
                <img src="./assets/images/dulceria/Margaritas.jpeg" alt="Margaritas">
                <a href="#" class="btn-productos">Ver productos</a>
            </div>

            <div class="card">
                <img src="./assets/images/dulceria/Trululu.jpg" alt="Trululu">
                <a href="#" class="btn-productos">Ver productos</a>
            </div>

            <div class="card">
                <img src="./assets/images/dulceria/Detodito.webp" alt="Detodito">
                <a href="#" class="btn-productos">Ver productos</a>
            </div>
        </div>
        </div>
            <div class="card">
                <img src="./assets/images/dulceria/Chocomix.jpg" alt="Chocomix">

            </div>

            <div class="card">
                <img src="./assets/images/dulceria/Golpe.webp" alt="Golpe">
                <a href="#" class="btn-productos">Ver productos</a>
            </div>

            <div class="card">
                <img src="./assets/images/dulceria/Chocolatinas Jef.webp" alt="Chocolatinas Jef">
                <a href="#" class="btn-productos">Ver productos</a>
            </div>

            <div class="card">
                <img src="./assets/images/dulceria/Nucitas..png" alt="Nucitas">
                <a href="#" class="btn-productos">Ver productos</a>
            </div>
        </div>

        
    </section>

    <section class="vidoPromocional">
        <div class="video-container">
            <video controls muted loop>
                <source src="assets/videos/videobombones.mp4" type="video/mp4">
                Tu navegador no soporta el elemento de video.
            </video>
        </div>
        <div class="productos-videos">
            <div class="tarjeta-video">
                <img src="./assets/images/dulceria/GomiAzucaradas.png" alt="gomitas azucaradas">
            </div>
            <div class="tarjeta-video">
                <img src="./assets/images/dulceria/GomiAzucaradas.png" alt="gomitas azucaradas">
            </div>
            <div class="tarjeta-video">
                <img src="./assets/images/dulceria/GomiAzucaradas.png" alt="gomitas azucaradas">

        </div>
